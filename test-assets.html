<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Diagnostic Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
        .success { color: #0f0; }
        .error { color: #f00; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #333; }
        h1 { color: #0ff; }
    </style>
</head>
<body>
    <h1>🔍 GitHub Pages Asset Diagnostic</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        // Test CSS files
        const cssFiles = [
            'lendex/assets/css/vendor/vendor.min.css',
            'lendex/assets/css/plugins/plugins.min.css',
            'lendex/assets/css/style.min.css'
        ];
        
        // Test JS files
        const jsFiles = [
            'lendex/assets/js/vendor.min.js',
            'lendex/assets/js/plugins.min.js',
            'lendex/assets/js/main.js'
        ];
        
        // Test image files
        const imageFiles = [
            'lendex/assets/images/portrait/portrait-hero.png',
            'lendex/assets/images/favicon.ico'
        ];
        
        async function testFile(path, type) {
            try {
                const response = await fetch(path);
                const status = response.ok ? '✅ OK' : `❌ ${response.status}`;
                const className = response.ok ? 'success' : 'error';
                results.innerHTML += `<div class="test ${className}">${type}: ${path} → ${status}</div>`;
            } catch (error) {
                results.innerHTML += `<div class="test error">${type}: ${path} → ❌ FAILED (${error.message})</div>`;
            }
        }
        
        async function runTests() {
            results.innerHTML += '<h2>Testing CSS Files:</h2>';
            for (const file of cssFiles) await testFile(file, 'CSS');
            
            results.innerHTML += '<h2>Testing JS Files:</h2>';
            for (const file of jsFiles) await testFile(file, 'JS');
            
            results.innerHTML += '<h2>Testing Image Files:</h2>';
            for (const file of imageFiles) await testFile(file, 'IMG');
            
            results.innerHTML += '<h2>Current URL Info:</h2>';
            results.innerHTML += `<div class="test">Base URL: ${window.location.origin}</div>`;
            results.innerHTML += `<div class="test">Full URL: ${window.location.href}</div>`;
            results.innerHTML += `<div class="test">Path: ${window.location.pathname}</div>`;
        }
        
        runTests();
    </script>
</body>
</html>
